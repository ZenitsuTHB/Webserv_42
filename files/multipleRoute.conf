server {
    listen 8080;
    server_name example.com;
    root /var/www/example;
    index index.html;
    client_max_body_size 20M;

    location / {
        autoindex off;
        allowed_methods GET POST;
        cgi_handlers {
            ".php" fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        }
    }

    location /uploads {
        root /var/www/uploads;
        allowed_methods GET POST;
        allow_file_uploads on;
    }

    error_page 404 /404.html;
}

