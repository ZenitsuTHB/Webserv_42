server {
    listen 8080;
	server_name example.com;
    root /var/www/example;
    index index.html;
    client_max_body_size 100M;

    location / {
        autoindex off;
        allow_file_uploads on;
        upload_directory /var/www/uploads;
        allowed_methods GET POST;
    }

    error_page 404 /404.html; 
}
